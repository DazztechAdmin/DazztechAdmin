<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Schedule | DazzTech Solutions</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700&family=Instrument+Sans:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="styles.css">
</head>
<body>

<nav class="navbar">
  <div class="container nav-inner">
    <div class="logo">DazzTech Solutions</div>
    <a href="index.html" class="nav-back">← Home</a>
  </div>
</nav>

<section class="form-section hero">
    <canvas id="heroCanvas"></canvas>
  <div class="form-card container hero-content">
    <h1>Book a Call</h1>

    <form action="https://formspree.io/f/xaqpgzoj" method="POST" id="scheduleForm" class="contact-form">

      <input type="hidden" name="form-type" value="Schedule Booking">

      <div class="input-group">
        <input type="email" name="email" placeholder="Your Email" required>
      </div>

      <div class="row">
        <input type="date" id="date" required>
        <input type="time" id="time" required>
      </div>

      <div class="input-group">
        <textarea name="message" id="message" placeholder="Project details..."></textarea>
      </div>

      <button class="cta-button glow">Confirm Booking</button>

    </form>

  </div>
</section>

</body>
<script src="script.js"></script>
</html>
